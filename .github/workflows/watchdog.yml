name: ResX Bot Watchdog

on:
  schedule:
    # Every 30 min, every day — GitHub deprioritizes/drops schedules that
    # only fire a couple times a week, so this checks often (cheap on a
    # public repo) and the script below no-ops except on Mon/Fri.
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      # Checks the bot's own state file (data/last_post.json on main) instead of GitHub
      # Actions run status — a run can post successfully to Slack and still show up as
      # "failure" (e.g. a later step errors), which made the old status-based check
      # retrigger the bot even though a real post had already gone out. Reading the
      # same claim file bot.py itself writes keeps this watchdog and the bot's own
      # same-day guard as one single source of truth.
      - name: Check current post state and re-trigger bot if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          if [ "$DOW" != "1" ] && [ "$DOW" != "5" ]; then
            echo "Not a digest day (Mon/Fri) — nothing to do"
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          STATE=$(gh api "repos/$GITHUB_REPOSITORY/contents/data/last_post.json?ref=main" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')
          [ -z "$STATE" ] && STATE='{}'

          STATE_DATE=$(echo "$STATE" | jq -r '.date // empty')
          STATUS=$(echo "$STATE" | jq -r '.status // "completed"')  # files from before this field existed = a completed run
          STARTED_AT=$(echo "$STATE" | jq -r '.started_at // empty')

          if [ "$STATE_DATE" != "$TODAY" ]; then
            echo "No run recorded for today ($TODAY) — retriggering"
            gh workflow run news_bot.yml --repo "$GITHUB_REPOSITORY" --ref main
            exit 0
          fi

          if [ "$STATUS" = "completed" ]; then
            echo "Already completed today's run ($(echo "$STATE" | jq -r '.posted_at // "unknown time"')) — nothing to do"
            exit 0
          fi

          if [ "$STATUS" = "running" ] && [ -n "$STARTED_AT" ]; then
            STARTED_EPOCH=$(date -u -d "$STARTED_AT" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date -u +%s)
            AGE_MIN=$(( (NOW_EPOCH - STARTED_EPOCH) / 60 ))
            if [ "$STARTED_EPOCH" != "0" ] && [ "$AGE_MIN" -lt 15 ]; then
              echo "A run claimed today's slot ${AGE_MIN}m ago and hasn't finished — leaving it alone"
              exit 0
            fi
            echo "The claimed run looks stale (${AGE_MIN}m old) — retriggering"
            gh workflow run news_bot.yml --repo "$GITHUB_REPOSITORY" --ref main
            exit 0
          fi

          echo "Today's run is in status '$STATUS' — retriggering"
          gh workflow run news_bot.yml --repo "$GITHUB_REPOSITORY" --ref main
