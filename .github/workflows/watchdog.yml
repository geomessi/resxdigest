name: ResX Bot Watchdog

on:
  schedule:
    # Every 30 min, every day — GitHub deprioritizes/drops schedules that
    # only fire a couple times a week, so this checks often (cheap on a
    # public repo) and the script below no-ops except on Mon/Fri.
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Re-trigger bot if it missed today's run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          if [ "$DOW" != "1" ] && [ "$DOW" != "5" ]; then
            echo "Not a digest day (Mon/Fri) — nothing to do"
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          ALREADY_RAN=$(gh run list \
            --workflow="news_bot.yml" \
            --repo "$GITHUB_REPOSITORY" \
            --limit 10 \
            --json createdAt,status \
            --jq "[.[] | select(.createdAt | startswith(\"$TODAY\")) | select(.status | IN(\"success\", \"in_progress\", \"queued\"))] | length")

          if [ "$ALREADY_RAN" = "0" ]; then
            echo "Bot missed today's run — re-triggering"
            gh workflow run news_bot.yml --repo "$GITHUB_REPOSITORY" --ref main
          else
            echo "Bot already ran today — all good"
          fi
