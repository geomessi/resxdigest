name: ResX Social Bot

on:
  schedule:
    # Tuesdays and Thursdays at 8:15am ET (12:15 UTC during EDT, UTC-4)
    - cron: "15 12 * * 2,4"
  workflow_dispatch: # allow manual trigger from GitHub UI
    inputs:
      force_post:
        description: "Post even if already posted today (marks the message as a forced re-run)"
        type: boolean
        default: false
      dry_run:
        description: "Dry run — print the Slack payload, post nothing, write no state"
        type: boolean
        default: false

jobs:
  run-social-bot:
    runs-on: ubuntu-latest
    # Hard backstop: the research call is bounded in-code (REQUEST_TIMEOUT / OVERALL_BUDGET),
    # but cap the whole job too so a hung run can never burn the 6h default again.
    timeout-minutes: 25

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run social bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_SOCIAL_WEBHOOK_URL: ${{ secrets.SLACK_SOCIAL_WEBHOOK_URL }}
          FORCE_POST: ${{ (inputs.force_post && '1') || '0' }}
          DRY_RUN: ${{ (inputs.dry_run && '1') || '0' }}
        run: python social_bot.py

      - name: Commit updated data files
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "resx-digest-bot"
          git config user.email "bot@resx.app"
          git add data/seen_ugc.json data/last_social_post.json data/social_pinned_leads.json data/social_skipped_log.json
          git diff --cached --quiet || git commit -m "bot: update seen UGC [skip ci]"
          git push
