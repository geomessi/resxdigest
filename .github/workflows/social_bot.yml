name: ResX Social Bot

on:
  schedule:
    # Daily at 9am ET (13:00 UTC during EDT, UTC-4)
    - cron: "0 13 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run-social-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run social bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_SOCIAL_WEBHOOK_URL: ${{ secrets.SLACK_SOCIAL_WEBHOOK_URL }}
        run: python social_bot.py

      - name: Commit updated seen UGC file
        run: |
          git config user.name "resx-digest-bot"
          git config user.email "bot@resx.app"
          git add data/seen_ugc.json
          git diff --cached --quiet || git commit -m "bot: update seen UGC [skip ci]"
          git push
